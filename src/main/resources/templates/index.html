<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Code Generator</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@400;500;600&display=swap">
    <link rel="stylesheet" href="/src/main/resources/static/css/style.css">
</head>

<body>
    <header>
        <p class="site-title">QR Code Generator</p>
    </header>

    <main class="container">
        <!-- Form panel -->
        <div class="panel" id="form-panel">

            <div class="field">
                <label for="data">Dữ liệu</label>
                <input type="text" id="data" placeholder="Nhập text hoặc URL...">
            </div>

            <div class="field">
                <label>Mức sửa lỗi</label>
                <div class="seg-group" id="ec-group">
                    <button class="seg-btn active" data-value="auto">Auto</button>
                    <button class="seg-btn" data-value="L">
                        <span class="btn-main">L</span>
                        <span class="sub">7%</span>
                    </button>
                    <button class="seg-btn" data-value="M">
                        <span class="btn-main">M</span>
                        <span class="sub">15%</span>
                    </button>
                    <button class="seg-btn" data-value="Q">
                        <span class="btn-main">Q</span>
                        <span class="sub">25%</span>
                    </button>
                    <button class="seg-btn" data-value="H">
                        <span class="btn-main">H</span>
                        <span class="sub">30%</span>
                    </button>
                </div>
            </div>

            <div class="field">
                <label>Version</label>
                <div class="version-grid" id="version-group">
                    <button class="v-btn active" data-value="auto">Auto</button>
                    <button class="v-btn" data-value="1">1</button>
                    <button class="v-btn" data-value="2">2</button>
                    <button class="v-btn" data-value="3">3</button>
                    <button class="v-btn" data-value="4">4</button>
                    <button class="v-btn" data-value="5">5</button>
                    <button class="v-btn" data-value="6">6</button>
                    <button class="v-btn" data-value="7">7</button>
                    <button class="v-btn" data-value="8">8</button>
                    <button class="v-btn" data-value="9">9</button>
                    <button class="v-btn" data-value="10">10</button>
                    <button class="v-btn" data-value="11">11</button>
                    <button class="v-btn" data-value="12">12</button>
                    <button class="v-btn" data-value="13">13</button>
                    <button class="v-btn" data-value="14">14</button>
                    <button class="v-btn" data-value="15">15</button>
                    <button class="v-btn" data-value="16">16</button>
                    <button class="v-btn" data-value="17">17</button>
                    <button class="v-btn" data-value="18">18</button>
                    <button class="v-btn" data-value="19">19</button>
                    <button class="v-btn" data-value="20">20</button>
                    <button class="v-btn" data-value="21">21</button>
                    <button class="v-btn" data-value="22">22</button>
                    <button class="v-btn" data-value="23">23</button>
                    <button class="v-btn" data-value="24">24</button>
                    <button class="v-btn" data-value="25">25</button>
                    <button class="v-btn" data-value="26">26</button>
                    <button class="v-btn" data-value="27">27</button>
                    <button class="v-btn" data-value="28">28</button>
                    <button class="v-btn" data-value="29">29</button>
                    <button class="v-btn" data-value="30">30</button>
                    <button class="v-btn" data-value="31">31</button>
                    <button class="v-btn" data-value="32">32</button>
                    <button class="v-btn" data-value="33">33</button>
                    <button class="v-btn" data-value="34">34</button>
                    <button class="v-btn" data-value="35">35</button>
                    <button class="v-btn" data-value="36">36</button>
                    <button class="v-btn" data-value="37">37</button>
                    <button class="v-btn" data-value="38">38</button>
                    <button class="v-btn" data-value="39">39</button>
                    <button class="v-btn" data-value="40">40</button>
                </div>
            </div>

            <button id="generate-btn">GENERATE</button>

        </div>

        <!-- Result panel -->
        <div class="panel" id="result-panel">

            <div class="canvas-wrap">
                <canvas id="qr-canvas"></canvas>
                <p class="placeholder-text" id="placeholder">QR code<br>sẽ hiện ở đây</p>
            </div>

            <div class="meta-row">
                <div class="meta-chip">
                    <span class="meta-label">Version</span>
                    <span class="meta-val" id="meta-version">—</span>
                </div>
                <div class="meta-chip">
                    <span class="meta-label">EC Level</span>
                    <span class="meta-val" id="meta-ec">—</span>
                </div>
            </div>

        </div>
    </main>

    <script src="/src/main/resources/static/js/app.js"></script>
</body>

</html>
